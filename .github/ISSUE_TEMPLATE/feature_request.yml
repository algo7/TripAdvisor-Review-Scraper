name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea so we can evaluate and discuss it.

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      description: Which part of the project does this feature relate to?
      options:
        - Scraper (standalone binary)
        - Container Provisioner (web UI / Docker orchestration)
        - Proxy Pool (VPN worker / proxy containers)
        - New Component / Integration
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What kind of feature is this?
      options:
        - New data field / scrape target (e.g. amenities, Michelin info, management responses)
        - New TripAdvisor location type support
        - Output format / export improvements
        - Proxy / networking improvements
        - Container Provisioner UI enhancement
        - Performance / scalability
        - Developer experience / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Is your feature request related to a problem? Describe it clearly.
        e.g. "I'm trying to scrape management responses under reviews but the scraper doesn't capture them."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you'd like. Be as specific as possible.
      placeholder: |
        e.g. "Add a `management_response` field to the Review struct that captures 
        the response text and date from the TripAdvisor GraphQL response."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: example-urls
    attributes:
      label: Example TripAdvisor URLs
      description: |
        If applicable, provide example TripAdvisor URLs that demonstrate the feature or data you're requesting.
      placeholder: |
        - https://www.tripadvisor.com/Restaurant_Review-g187265-d11827759-Reviews-...
        - https://www.tripadvisor.com/Airline_Review-d8729113-Reviews-...
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: Contribution
      description: Would you be willing to submit a PR for this feature?
      options:
        - "Yes, I'd like to implement this"
        - "I can help with testing"
        - "No, but I'd like to see it implemented"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, screenshots, or references.
    validations:
      required: false
